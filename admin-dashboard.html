<!DOCTYPE html>
<html lang="id" data-theme="light" data-style="normal">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaDes - Admin Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="dashboard-container">
        <aside class="sidebar panel-glass">
            <div class="sidebar-header"><h2>KaDes</h2></div>
            <div class="profile-section">
                <div class="profile-image-container">
                    <img id="profilePreview" src="https://ui-avatars.com/api/?name=Admin&background=10b981&color=fff" alt="Profil">
                    <label for="uploadPhoto" class="upload-overlay" title="Ganti Foto">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    </label>
                    <input type="file" id="uploadPhoto" accept="image/*" hidden>
                </div>
                <h3>Halo, Admin!</h3>
            </div>
            <ul class="nav-links">
                <li><a href="admin-dashboard.html" class="active">Dashboard</a></li>
                <li><a href="data-anggota.html">Data Anggota</a></li>
                <li><a href="laporan.html">Laporan Keuangan</a></li>
                <li><a href="data-pembayaran.html">Data Pembayaran</a></li>
            </ul>
            <div class="logout-section">
                <a href="index.html" class="logout-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Keluar
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header panel-glass">
                <div class="header-title"><h3>Sistem KaDes</h3></div>
                
                <div class="header-actions-right" style="display: flex; gap: 15px; align-items: center;">
                    
                    <div class="notification-wrapper" style="position: relative;">
                        <button id="notificationBtn" class="icon-btn" title="Notifikasi" style="position: relative;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                            <span class="notif-badge" style="display: none;">0</span>
                        </button>

                        <div id="notificationDropdown" class="notif-dropdown panel-glass">
                            <div class="notif-header">
                                <h4>Notifikasi Baru</h4>
                            </div>
                            <ul class="notif-list">
                                </ul>
                        </div>
                    </div>

                    <div class="theme-controls" style="display: flex; gap: 5px;">
                        <button id="toggleTheme" class="icon-btn"></button>
                        <button id="toggleStyle" class="icon-btn"></button>
                    </div>
                    
                </div>
            </header>
            <div class="cards-grid">
                <div class="card panel-glass">
                    <h4>Total Pemasukan Kas</h4>
                    <p style="color: var(--primary-color);">Rp <span class="counter" id="totalPemasukan" data-target="0">0</span></p>
                </div>
                <div class="card panel-glass">
                    <h4>Total Pengeluaran Kas</h4>
                    <p style="color: var(--danger-color);">Rp <span class="counter" id="totalPengeluaran" data-target="0">0</span></p>
                </div>
                <div class="card panel-glass">
                    <h4>Saldo Akhir Kas</h4>
                    <p style="color: var(--text-color);">Rp <span class="counter" id="saldoKas" data-target="0">0</span></p>
                </div>
                <div class="card panel-glass">
                    <h4>Anggota Terdaftar</h4>
                    <p><span class="counter" id="totalAnggota" data-target="0">0</span> Orang</p>
                </div>
                <div class="card panel-glass">
                    <h4>Anggota Aktif</h4>
                    <p><span class="counter" id="anggotaAktif" data-target="0">0</span> Orang</p>
                </div>
                <div class="card panel-glass">
                    <h4>Anggota Tidak Aktif</h4>
                    <p><span class="counter" id="anggotaTidakAktif" data-target="0">0</span> Orang</p>
                </div>
            </div>
        </main>
    </div>

    <!-- <div id="toastPopup" class="toast-popup panel-glass">
        <div class="toast-text">
            <h4>Pemberitahuan</h4>
            <p id="toastMessage">Ada notifikasi baru!</p>
        </div>
        <button onclick="document.getElementById('toastPopup').classList.remove('show')" style="background:transparent; border:none; color:inherit; cursor:pointer; font-size:18px; padding-left:10px;">✕</button>
    </div> -->

    <script src="dashboard.js"></script>
</body>
</html>

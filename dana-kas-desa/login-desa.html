<!DOCTYPE html>
<html lang="id" class="transition-colors duration-300" data-theme="light" data-style="glass">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Warga - KaDes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#10b981', primaryDark: '#059669', blob: { 1: '#34d399', 2: '#10b981', 3: '#059669' }, blobDark: { 1: '#059669', 2: '#047857', 3: '#0f766e' } },
                    animation: { 'liquid': 'liquidAnim 15s infinite alternate ease-in-out' },
                    keyframes: { liquidAnim: { '0%': { transform: 'translate(0, 0) scale(1)' }, '100%': { transform: 'translate(40px, 40px) scale(1.1)' } } }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer components {
            .panel-theme { @apply bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm transition-all duration-500 rounded-2xl; }
            html[data-style="glass"] .panel-theme { @apply bg-white/40 dark:bg-slate-900/50 backdrop-blur-xl border-white/60 dark:border-white/10 shadow-[0_8px_32px_0_rgba(16,185,129,0.15)] dark:shadow-[0_8px_32px_0_rgba(0,0,0,0.4)]; }
            .input-field { @apply w-full px-4 py-3 bg-transparent border border-slate-300 dark:border-slate-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-300; }
            html[data-style="glass"] .input-field { @apply bg-white/50 dark:bg-slate-800/50 border-slate-200 dark:border-slate-700; }
            .btn-primary { @apply w-full py-3 bg-primary hover:bg-primaryDark text-white font-bold rounded-xl transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_8px_20px_rgba(16,185,129,0.4)] flex justify-center items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed; }
            .icon-btn { @apply w-10 h-10 rounded-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-md text-slate-800 dark:text-slate-100 flex justify-center items-center cursor-pointer transition-all duration-300 hover:scale-105; }
            html[data-style="glass"] .icon-btn { @apply bg-white/50 dark:bg-slate-800/50 backdrop-blur-md; }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen flex items-center justify-center relative overflow-hidden font-sans">

    <div class="absolute top-6 right-6 z-50 flex gap-3">
        <button id="toggleTheme" class="icon-btn" title="Ganti Tema"></button>
        <button id="toggleStyle" class="icon-btn" title="Ganti Gaya"></button>
    </div>

    <div id="liquidBg" aria-hidden="true" class="fixed inset-0 -z-10 blur-[40px] opacity-0 transition-opacity duration-500 html-[data-style='glass']:opacity-85">
        <div class="absolute rounded-full animate-liquid bg-blob-1 dark:bg-blobDark-1 w-[300px] h-[300px] top-[-5%] left-[10%] transition-colors duration-500"></div>
        <div class="absolute rounded-full animate-liquid bg-blob-2 dark:bg-blobDark-2 w-[400px] h-[400px] bottom-[-10%] right-[10%] animation-delay-[4s] transition-colors duration-500"></div>
    </div>

    <main class="w-full max-w-md px-6 relative z-10">
        <article class="panel-theme p-8 sm:p-10 text-center">
            <div class="mb-8">
                <a href="dana-desa.html" class="text-3xl font-extrabold tracking-tight">Kop<span class="text-primary">Des</span></a>
            </div>
            
            <header class="mb-8 text-left">
                <h1 class="text-2xl font-bold mb-2">Login Warga</h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm">Silakan masukkan NIK dan Password Anda untuk mengakses panel.</p>
            </header>

            <form id="loginForm" class="text-left flex flex-col gap-5">
                <div>
                    <label for="nik" class="block text-sm font-semibold mb-2 ml-1">NIK / Gmail</label>
                    <input type="text" id="nik" name="nik" class="input-field" placeholder="Contoh: 32760123456..." required>
                </div>
                <div>
                    <label for="password" class="block text-sm font-semibold mb-2 ml-1">Password</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" class="input-field pr-12" placeholder="Masukkan password" required>
                        <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 opacity-50 hover:opacity-100 transition-opacity">👁️</button>
                    </div>
                </div>

                <div id="loginError" class="hidden text-sm text-red-500 font-medium bg-red-500/10 p-3 rounded-lg text-center"></div>

                <button type="submit" id="submitBtn" class="btn-primary mt-2">
                    <span id="btnText">Masuk Sekarang</span>
                    <svg id="btnSpinner" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>
            </form>

            <footer class="mt-8 flex flex-col gap-3">
                <a href="dana-desa.html" class="text-sm font-medium text-slate-500 hover:text-primary transition-colors">← Kembali ke Beranda</a>
                <a href="../login-admin.html" class="text-xs font-bold text-primary hover:underline">Anda Pengurus? Login Admin Disini</a>
            </footer>
        </article>
    </main>

    <script src="desa-api.js"></script>
</body>
</html>
